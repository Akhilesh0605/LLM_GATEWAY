
services:
  redis:
    image: redis:7
    container_name: llm-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: llm-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: llmgateway
    ports:
      - "5432:5432"
  app:
    build: .
    container_name: llm-app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
    env_file:
      - .env